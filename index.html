<!-- YouTube Player -->
<div id="player"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let focusTime = 25 * 60;
let breakTime = 5 * 60;
let time = focusTime;
let timer;
let isRunning = false;
let isFocus = true;
let player;

// Load YouTube player
function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
        height: '250',
        width: '100%',
        videoId: 'jfKfPfyJRdk',
        playerVars: {
            autoplay: 0,
            controls: 1
        }
    });
}

function updateDisplay() {
    let minutes = Math.floor(time / 60);
    let seconds = time % 60;
    document.getElementById("timer").innerText =
        `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
}

function startTimer() {
    if (isRunning) return;

    isRunning = true;

    // ▶️ PLAY VIDEO
    if (player) player.playVideo();

    timer = setInterval(() => {
        time--;

        if (time <= 0) {
            clearInterval(timer);
            isRunning = false;

            if (player) player.pauseVideo(); // pause on switch

            if (isFocus) {
                isFocus = false;
                time = breakTime;
                document.getElementById("mode").innerText = "Break";
                alert("Break time!");
            } else {
                isFocus = true;
                time = focusTime;
                document.getElementById("mode").innerText = "Focus";
                alert("Back to focus!");
            }

            updateDisplay();
        }

        updateDisplay();
    }, 1000);
}

function pauseTimer() {
    clearInterval(timer);
    isRunning = false;

    // ⏸️ PAUSE VIDEO
    if (player) player.pauseVideo();
}

function resetTimer() {
    clearInterval(timer);
    isRunning = false;
    isFocus = true;
    time = focusTime;
    document.getElementById("mode").innerText = "Focus";

    // ⏹️ STOP VIDEO (reset to start)
    if (player) player.stopVideo();

    updateDisplay();
}

updateDisplay();
</script>
